name: ci-expense-tracker
on:
  push:
    branches:
      - "main"
permissions:
  id-token: write
  contents: read
jobs:
  #----------------------------------------------
  # 1. Build and push docker images to AWS ECR
  #----------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout the code"
        uses: actions/checkout@v6.0.2

      - name: Get File Architect
        run: ls -la

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_EKS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker backend-image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: expense-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app/backend
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push docker frontend-image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: expense-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app/frontend
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
  #-----------------------------------------------
  # 2. Deploy job that upload to AWS EKS cluster
  #-----------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_EKS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update AWS config
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy backend image
        env:
          KUBECONFIG: ~/.kube/config
        run: |
          kubectl set image deployment/backend-deployment \
          backend-container=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/expense-backend:${{ github.sha }}

      - name: Deploy frontend image
        env:
          KUBECONFIG: ~/.kube/config
        run: |
          kubectl set image deployment/frontend-deployment \
          frontend-container=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/expense-frontend:${{ github.sha }}

      - name: Rollout backend
        env:
          KUBECONFIG: ~/.kube/config
        run: |
          kubectl rollout status deployment/backend-deployment

      - name: Rollout frontend
        env:
          KUBECONFIG: ~/.kube/config
        run: |
          kubectl rollout status deployment/frontend-deployment
