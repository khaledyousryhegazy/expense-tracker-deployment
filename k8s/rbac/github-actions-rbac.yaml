apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-edit
subjects:
  - kind: User
    name: github-actions
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io

# this is needed cause the runner couldn't apply the manifests or change images on the cluster without this role
